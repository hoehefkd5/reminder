name: 自动提醒系统

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  reminder:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Reminder
        env:
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python reminder.py
