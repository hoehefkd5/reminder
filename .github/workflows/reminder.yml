name: AI Reminder

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install deps
        run: pip install requests

      - name: inbox
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python inbox.py

      - name: reminder
        env:
          TZ: Asia/Shanghai
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python reminder.py

      - name: stats
        run: python stats.py

      - name: save
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "update" || echo "no change"
          git push
