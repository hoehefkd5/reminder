<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>任务日历</title>
</head>

<body>

<h1>📅 我的任务</h1>

<ul id="tasks"></ul>

<script>
function load(){
  fetch("events.txt?t=" + Date.now())
  .then(r=>r.text())
  .then(t=>{
    let ul=document.getElementById("tasks")
    ul.innerHTML=""
    t.split("\n").forEach(line=>{
      if(!line.trim()) return
      let li=document.createElement("li")
      li.innerText=line
      ul.appendChild(li)
    })
  })
}

setInterval(load,5000)
load()
</script>

</body>
</html>
